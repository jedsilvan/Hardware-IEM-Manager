services:
  db:
    image: postgres:16-alpine
    container_name: gear_tracker_db
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: gear_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d gear_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./gear-tracker-backend
      dockerfile: Dockerfile
    container_name: gear_tracker_backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://dev_user:dev_password@db:5432/gear_tracker
      FRONTEND_URL: http://localhost:3000
      PORT: 3001
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 20s
    volumes:
      - ./gear-tracker-backend:/app
      - backend_node_modules:/app/node_modules
    command: sh -c "npm run db:push ; npm run db:seed ; npm run dev"

  frontend:
    build:
      context: ./gear-tracker-frontend
      dockerfile: Dockerfile
    container_name: gear_tracker_frontend
    restart: always
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_INTERNAL_URL: http://backend:3001
      PORT: 3000
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      NEXT_WEBPACK_USEPOLLING: "1"
    ports:
      - "3000:3000"
    volumes:
      - ./gear-tracker-frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    command:
      - sh
      - -c
      - "echo 'gear_tracker_frontend: frontend is running on http://localhost:3000' ; npm run dev -- --hostname 0.0.0.0 --port 3000 --webpack"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next: