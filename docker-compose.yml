version: "3.8"
services:
  app:
    build: .
    container_name: gear_tracker_all_in_one
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: gear_tracker
    ports:
      - "5432:5432"   # Postgres
      - "3001:3001"   # Backend (adjust if needed)
      - "3000:3000"   # Frontend
    volumes:
      - ./gear-tracker-backend:/app/gear-tracker-backend
      - ./gear-tracker-frontend:/app/gear-tracker-frontend
    command: ["./start.sh"]