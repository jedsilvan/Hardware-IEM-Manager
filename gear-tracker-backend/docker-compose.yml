services:
  db:
    image: postgres:16-alpine
    container_name: gear_tracker_db
    restart: always
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: gear_tracker
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d gear_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: